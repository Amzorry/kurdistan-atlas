<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kurdistan Historical Atlas — Çavkaniya Dîrokî</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
/* ─── TOKENS ─────────────────────────────────────────────── */
:root {
  --navy:    #0D1B2A;
  --navy2:   #152336;
  --navy3:   #1E3148;
  --sand:    #C9A96E;
  --sand2:   #E8C97A;
  --sage:    #4A7C59;
  --terra:   #B85C38;
  --cream:   #F2EDE4;
  --cream2:  #E8E0D5;
  --text:    #1A1A2E;
  --text2:   #3D3D5C;
  --muted:   #7A7A9A;
  --border:  #D4CBBE;
  --panel-bg:#FFFFFF;
  --map-bg:  #F2EDE4;
  --shadow:  0 8px 32px rgba(13,27,42,0.12);
  --shadow2: 0 2px 8px rgba(13,27,42,0.08);
  --r:       8px;
  --r2:      14px;
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --cream:   #0D1B2A;
  --cream2:  #152336;
  --text:    #F2EDE4;
  --text2:   #C9B99A;
  --muted:   #8A8AA8;
  --border:  #2A3A50;
  --panel-bg:#152336;
  --map-bg:  #0D1B2A;
  --shadow:  0 8px 32px rgba(0,0,0,0.4);
  --shadow2: 0 2px 8px rgba(0,0,0,0.3);
  --sand:    #E8C97A;
  --sand2:   #F0D890;
}
/* ─── RESET ──────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;font-size:15px;color:var(--text);background:var(--cream);transition:background var(--transition),color var(--transition)}
/* ─── LAYOUT ─────────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100vh}
#topbar{display:flex;align-items:center;gap:12px;padding:0 16px;height:58px;background:var(--navy);border-bottom:1px solid rgba(201,169,110,0.25);z-index:1000;flex-shrink:0;position:relative}
#main{display:flex;flex:1;overflow:hidden;position:relative}
#map-container{flex:1;position:relative;background:var(--map-bg)}
#map{width:100%;height:100%}
/* ─── TOPBAR ─────────────────────────────────────────────── */
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--sand),var(--sand2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{color:#fff;font-family:'Playfair Display',serif;font-size:17px;font-weight:700;letter-spacing:-0.3px;line-height:1.1}
.logo-sub{color:var(--sand);font-family:'Inter',sans-serif;font-size:10px;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;display:block}
.topbar-sep{width:1px;height:28px;background:rgba(255,255,255,0.12);margin:0 4px}
#search-wrap{flex:1;max-width:320px;position:relative}
#search{width:100%;padding:8px 12px 8px 36px;border:1px solid rgba(255,255,255,0.15);border-radius:var(--r);background:rgba(255,255,255,0.08);color:#fff;font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border var(--transition)}
#search::placeholder{color:rgba(255,255,255,0.4)}
#search:focus{border-color:var(--sand);background:rgba(255,255,255,0.12)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.4);pointer-events:none;font-size:14px}
#search-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--panel-bg);border-radius:var(--r);box-shadow:var(--shadow);z-index:2000;display:none;max-height:220px;overflow-y:auto}
.sr-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--border);font-size:13px;transition:background var(--transition)}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:var(--cream)}
.sr-item strong{color:var(--navy);display:block;font-size:13px}
.sr-cat{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
[data-theme="dark"] .sr-item strong{color:var(--sand)}
[data-theme="dark"] .sr-item:hover{background:var(--navy3)}
/* filter bar */
#filter-bar{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap}
#filter-bar::-webkit-scrollbar{display:none}
.filter-btn{padding:5px 13px;border:1px solid rgba(255,255,255,0.2);border-radius:20px;background:transparent;color:rgba(255,255,255,0.7);font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;white-space:nowrap;transition:all var(--transition);letter-spacing:.3px}
.filter-btn:hover{border-color:var(--sand);color:var(--sand)}
.filter-btn.active{background:var(--sand);color:var(--navy);border-color:var(--sand);font-weight:600}
/* topbar actions */
.tb-btn{background:none;border:none;color:rgba(255,255,255,0.7);cursor:pointer;padding:6px;border-radius:6px;font-size:16px;line-height:1;transition:all var(--transition);display:flex;align-items:center;gap:5px}
.tb-btn:hover{color:#fff;background:rgba(255,255,255,0.1)}
.tb-btn.active{color:var(--sand2)}
.tb-label{font-size:11px;font-weight:500;letter-spacing:.5px}
/* ─── DETAIL PANEL ───────────────────────────────────────── */
#detail-panel{position:absolute;top:0;right:0;width:400px;height:100%;background:var(--panel-bg);box-shadow:-4px 0 24px rgba(13,27,42,0.15);z-index:800;transform:translateX(100%);transition:transform var(--transition);display:flex;flex-direction:column;overflow:hidden}
#detail-panel.open{transform:translateX(0)}
#panel-header{background:var(--navy);padding:20px 20px 16px;flex-shrink:0}
.panel-cat-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
#panel-title{color:#fff;font-family:'Playfair Display',serif;font-size:22px;font-weight:700;line-height:1.25;margin-bottom:4px}
#panel-subtitle{color:var(--sand);font-size:13px;opacity:.85}
#panel-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,0.1);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;line-height:1;transition:background var(--transition);display:flex;align-items:center;justify-content:center}
#panel-close:hover{background:rgba(255,255,255,0.2)}
#panel-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--panel-bg);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#panel-tabs::-webkit-scrollbar{display:none}
.ptab{padding:12px 16px;font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);background:none;border-left:none;border-right:none;border-top:none;transition:all var(--transition);white-space:nowrap}
.ptab.active{color:var(--sand);border-bottom-color:var(--sand)}
.ptab:hover:not(.active){color:var(--text)}
#panel-body{flex:1;overflow-y:auto;padding:20px;scroll-behavior:smooth}
#panel-body::-webkit-scrollbar{width:4px}
#panel-body::-webkit-scrollbar-track{background:transparent}
#panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.tab-content{display:none}
.tab-content.active{display:block}
/* content styles */
.section-label{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--sand);margin:20px 0 8px}
.section-label:first-child{margin-top:0}
.prose{font-size:14px;line-height:1.7;color:var(--text2);margin-bottom:12px}
.highlight-box{background:linear-gradient(135deg,rgba(201,169,110,.08),rgba(201,169,110,.03));border-left:3px solid var(--sand);padding:12px 14px;border-radius:0 var(--r) var(--r) 0;margin:12px 0}
.highlight-box p{font-size:13px;line-height:1.65;color:var(--text2);font-style:italic}
/* timeline */
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:2px;background:var(--border)}
.tl-item{position:relative;margin-bottom:20px;animation:fadeUp .4s ease both}
.tl-dot{position:absolute;left:-20px;top:4px;width:14px;height:14px;border-radius:50%;border:2px solid var(--panel-bg);box-shadow:0 0 0 2px var(--sand);background:var(--sand);z-index:1;transition:transform var(--transition)}
.tl-dot.revolt{box-shadow:0 0 0 2px var(--terra);background:var(--terra)}
.tl-dot.tragedy{box-shadow:0 0 0 2px #8B1A1A;background:#8B1A1A}
.tl-dot.culture{box-shadow:0 0 0 2px var(--sage);background:var(--sage)}
.tl-dot.political{box-shadow:0 0 0 2px #4A90D9;background:#4A90D9}
.tl-dot.battle{box-shadow:0 0 0 2px #7B4FA3;background:#7B4FA3}
.tl-dot.landmark{box-shadow:0 0 0 2px var(--sand2);background:var(--sand2)}
.tl-year{font-size:11px;font-weight:700;color:var(--sand);letter-spacing:.5px;margin-bottom:2px}
.tl-event{font-size:13px;font-weight:600;color:var(--text);margin-bottom:3px}
.tl-desc{font-size:12px;color:var(--text2);line-height:1.55}
/* figures */
.figure-card{display:flex;gap:12px;padding:12px;border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;transition:box-shadow var(--transition)}
.figure-card:hover{box-shadow:var(--shadow2)}
.fig-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--navy),var(--navy3));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.fig-info h4{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.fig-info p{font-size:12px;color:var(--text2);line-height:1.5}
.fig-role{font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--sand);margin-bottom:3px}
/* sources */
.source-item{padding:10px 12px;border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;font-size:12px;color:var(--text2);line-height:1.5}
.source-item strong{color:var(--text);font-weight:600}
/* gallery meta */
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.meta-cell{background:var(--cream);border-radius:var(--r);padding:10px 12px}
[data-theme="dark"] .meta-cell{background:var(--navy3)}
.meta-cell .key{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.meta-cell .val{font-size:13px;font-weight:500;color:var(--text)}
/* ─── TIMELINE DRAWER ────────────────────────────────────── */
#timeline-drawer{position:absolute;bottom:0;left:0;right:0;background:var(--panel-bg);border-top:1px solid var(--border);z-index:700;transform:translateY(100%);transition:transform var(--transition);max-height:240px}
#timeline-drawer.open{transform:translateY(0)}
#tl-header{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--border)}
#tl-header h3{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--text)}
#tl-range{font-size:12px;color:var(--muted);margin-left:auto}
.tl-close{background:none;border:none;cursor:pointer;color:var(--muted);font-size:18px;line-height:1;padding:2px 6px}
#tl-scroll{overflow-x:auto;padding:16px 18px;display:flex;gap:0;position:relative;min-height:120px}
#tl-scroll::-webkit-scrollbar{height:4px}
#tl-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.tl-track{display:flex;gap:0;position:relative;align-items:flex-end;padding-bottom:28px}
.tl-tick{display:flex;flex-direction:column;align-items:center;min-width:80px;position:relative;cursor:pointer}
.tl-tick-year{font-size:10px;color:var(--muted);position:absolute;bottom:0;left:50%;transform:translateX(-50%);white-space:nowrap}
.tl-tick-line{width:1px;background:var(--border);height:20px;margin-bottom:4px}
.tl-evt-dot{width:10px;height:10px;border-radius:50%;background:var(--sand);border:2px solid var(--panel-bg);box-shadow:0 0 0 1.5px var(--sand);transition:transform var(--transition);cursor:pointer;margin-bottom:2px}
.tl-evt-dot:hover{transform:scale(1.4)}
.tl-evt-dot.revolt{box-shadow:0 0 0 1.5px var(--terra);background:var(--terra)}
.tl-evt-dot.tragedy{box-shadow:0 0 0 1.5px #8B1A1A;background:#8B1A1A}
.tl-evt-dot.culture{box-shadow:0 0 0 1.5px var(--sage);background:var(--sage)}
.tl-evt-dot.political{box-shadow:0 0 0 1.5px #4A90D9;background:#4A90D9}
.tl-evt-label{font-size:9px;color:var(--muted);text-align:center;max-width:72px;line-height:1.3;margin-top:2px}
/* ─── MAP ATTRIBUTION & LEAFLET TWEAKS ──────────────────── */
.leaflet-control-zoom{border:none !important;box-shadow:var(--shadow2) !important}
.leaflet-control-zoom a{background:var(--panel-bg) !important;color:var(--text) !important;border-color:var(--border) !important;width:32px !important;height:32px !important;line-height:32px !important;font-size:16px !important}
.leaflet-popup-content-wrapper{background:var(--panel-bg);border-radius:var(--r2);box-shadow:var(--shadow);border:none}
.leaflet-popup-tip{background:var(--panel-bg)}
.leaflet-popup-content{margin:12px 16px;font-family:'Inter',sans-serif;color:var(--text)}
.popup-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;margin-bottom:3px}
.popup-sub{font-size:12px;color:var(--muted);margin-bottom:8px}
.popup-btn{background:var(--navy);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;transition:background var(--transition);display:block;width:100%;text-align:center;margin-top:8px}
.popup-btn:hover{background:var(--navy3)}
/* ─── MAP PULSE MARKERS ──────────────────────────────────── */
.pulse-marker{position:relative;cursor:pointer}
.pulse-inner{width:14px;height:14px;border-radius:50%;background:var(--sand2);border:2.5px solid var(--navy);position:relative;z-index:2}
.pulse-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;border:2px solid var(--sand2);opacity:.7;animation:pulse 2.2s ease-out infinite}
@keyframes pulse{0%{transform:translate(-50%,-50%) scale(1);opacity:.7}100%{transform:translate(-50%,-50%) scale(3.5);opacity:0}}
.pulse-inner.revolt{background:var(--terra);border-color:#6B2A1A}
.pulse-ring.revolt{border-color:var(--terra)}
.pulse-inner.tragedy{background:#C0392B;border-color:#6B1010}
.pulse-ring.tragedy{border-color:#C0392B}
.pulse-inner.culture{background:var(--sage);border-color:#1E3A2A}
.pulse-ring.culture{border-color:var(--sage)}
.pulse-inner.political{background:#2980B9;border-color:#1A4A70}
.pulse-ring.political{border-color:#2980B9}
.pulse-inner.landmark{background:var(--sand2);border-color:#6B4A10}
.pulse-ring.landmark{border-color:var(--sand2)}
/* ─── LEGEND ─────────────────────────────────────────────── */
#legend{position:absolute;bottom:16px;left:16px;background:var(--panel-bg);border-radius:var(--r2);box-shadow:var(--shadow);padding:12px 15px;z-index:700;min-width:160px;transition:opacity var(--transition)}
#legend h4{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:12px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* ─── LOADING ─────────────────────────────────────────────── */
#loading{position:fixed;inset:0;background:var(--navy);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px;transition:opacity .5s}
#loading.hide{opacity:0;pointer-events:none}
.loading-logo{font-family:'Playfair Display',serif;color:#fff;font-size:28px;font-weight:700}
.loading-sub{color:var(--sand);font-size:13px;letter-spacing:2px;text-transform:uppercase}
.loading-bar{width:200px;height:2px;background:rgba(255,255,255,0.1);border-radius:1px;overflow:hidden}
.loading-fill{height:100%;width:0;background:linear-gradient(90deg,var(--sand),var(--sand2));border-radius:1px;animation:fill 1.2s ease forwards .3s}
@keyframes fill{to{width:100%}}
/* ─── ANIMATIONS ─────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.fade-up{animation:fadeUp .4s ease both}
/* ─── MOBILE ─────────────────────────────────────────────── */
@media(max-width:768px){
  .logo-text{font-size:14px}
  .logo-sub{display:none}
  #filter-bar{display:none}
  .topbar-sep{display:none}
  #detail-panel{width:100%;bottom:0;height:80vh;top:auto;transform:translateY(100%)}
  #detail-panel.open{transform:translateY(0)}
  #legend{bottom:20px;right:16px;left:auto}
  #search-wrap{max-width:180px}
}
/* ─── CATEGORY COLORS ────────────────────────────────────── */
.cat-revolt{background:rgba(184,92,56,.15);color:#B85C38;border-color:rgba(184,92,56,.3)}
.cat-tragedy{background:rgba(139,26,26,.15);color:#C0392B;border-color:rgba(139,26,26,.3)}
.cat-culture{background:rgba(74,124,89,.15);color:#4A7C59;border-color:rgba(74,124,89,.3)}
.cat-political{background:rgba(41,128,185,.15);color:#2980B9;border-color:rgba(41,128,185,.3)}
.cat-battle{background:rgba(123,79,163,.15);color:#7B4FA3;border-color:rgba(123,79,163,.3)}
.cat-landmark{background:rgba(232,201,122,.2);color:#8B6914;border-color:rgba(201,169,110,.3)}
[data-theme="dark"] .cat-landmark{color:var(--sand2)}
/* tag */
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin:2px 3px 2px 0}
.tag-year{background:var(--cream);color:var(--muted);border:1px solid var(--border)}
[data-theme="dark"] .tag-year{background:var(--navy3)}
/* no-select panel header */
#panel-header{position:relative;user-select:none}
/* tooltip */
[title]{cursor:help}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <div class="loading-logo">Kurdistan Atlas</div>
  <div class="loading-sub">Çavkaniya Dîrokî · Historical Source</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<div id="app">
  <!-- Top bar -->
  <nav id="topbar">
    <a class="logo" href="#">
      <div class="logo-icon">☀️</div>
      <div class="logo-text">Kurdistan Atlas<span class="logo-sub">Historical &amp; Cultural</span></div>
    </a>
    <div class="topbar-sep"></div>

    <div id="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="search" type="text" placeholder="Search locations, events…" autocomplete="off"/>
      <div id="search-results"></div>
    </div>

    <div class="topbar-sep"></div>
    <div id="filter-bar">
      <button class="filter-btn active" data-cat="all">All</button>
      <button class="filter-btn" data-cat="landmark">🏛 Landmarks</button>
      <button class="filter-btn" data-cat="revolt">⚔ Revolts</button>
      <button class="filter-btn" data-cat="battle">🛡 Battles</button>
      <button class="filter-btn" data-cat="political">📜 Political</button>
      <button class="filter-btn" data-cat="tragedy">🕊 Tragedies</button>
      <button class="filter-btn" data-cat="culture">🎭 Culture</button>
    </div>

    <div style="margin-left:auto;display:flex;gap:4px;align-items:center">
      <button class="tb-btn" id="btn-timeline" title="Toggle timeline">📅<span class="tb-label" style="display:none">Timeline</span></button>
      <button class="tb-btn" id="btn-dark" title="Toggle dark mode">🌙</button>
      <button class="tb-btn" id="btn-locate" title="Fit to Kurdistan">🗺</button>
    </div>
  </nav>

  <!-- Main area -->
  <div id="main">
    <!-- Map -->
    <div id="map-container">
      <div id="map"></div>
    </div>

    <!-- Detail Panel -->
    <aside id="detail-panel">
      <div id="panel-header">
        <button id="panel-close">✕</button>
        <span class="panel-cat-badge" id="panel-badge"></span>
        <div id="panel-title">Location</div>
        <div id="panel-subtitle"></div>
      </div>
      <div id="panel-tabs">
        <button class="ptab active" data-tab="overview">Overview</button>
        <button class="ptab" data-tab="history">History</button>
        <button class="ptab" data-tab="events">Events</button>
        <button class="ptab" data-tab="figures">Figures</button>
        <button class="ptab" data-tab="sources">Sources</button>
      </div>
      <div id="panel-body">
        <div class="tab-content active" id="tab-overview"></div>
        <div class="tab-content" id="tab-history"></div>
        <div class="tab-content" id="tab-events"></div>
        <div class="tab-content" id="tab-figures"></div>
        <div class="tab-content" id="tab-sources"></div>
      </div>
    </aside>

    <!-- Legend -->

/* ─── MARKERS ─────────────────────────────────────────────── */
const markers = {};
let activeFilter = 'all';

function createPulseIcon(cat) {
  const inner = document.createElement('div');
  inner.className = `pulse-inner ${cat}`;
  const ring = document.createElement('div');
  ring.className = `pulse-ring ${cat}`;
  const wrap = document.createElement('div');
  wrap.className = 'pulse-marker';
  wrap.appendChild(ring);
  wrap.appendChild(inner);
  return L.divIcon({html: wrap.outerHTML, className:'', iconSize:[14,14], iconAnchor:[7,7]});
}

function addMarkers() {
  LOCATIONS.forEach(loc => {
    const marker = L.marker([loc.lat, loc.lng], {
      icon: createPulseIcon(loc.cat),
      title: loc.name,
    }).addTo(map);

    const popup = L.popup({closeButton:false, maxWidth:220, className:'', offset:[0,-8]}).setContent(`
      <div class="popup-title">${loc.emoji} ${loc.name}</div>
      <div class="popup-sub">${loc.subtitle}</div>
      <span class="tag tag-year">${loc.cat.toUpperCase()}</span>
      <button class="popup-btn" onclick="openPanel('${loc.id}')">Explore History →</button>
    `);
    marker.bindPopup(popup);
    marker.on('click', () => { openPanel(loc.id); map.setView([loc.lat, loc.lng], Math.max(map.getZoom(), 8), {animate:true}); });
    markers[loc.id] = marker;
  });
}
addMarkers();

/* ─── FILTER ──────────────────────────────────────────────── */
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.cat;
    LOCATIONS.forEach(loc => {
      const m = markers[loc.id];
      if (!m) return;
      if (activeFilter === 'all' || loc.cat === activeFilter) {
        m.addTo(map);
      } else {
        map.removeLayer(m);
      }
    });
  });
});

const catColors = {
  landmark:'cat-landmark', revolt:'cat-revolt', battle:'cat-battle',
  political:'cat-political', tragedy:'cat-tragedy', culture:'cat-culture'
};
const catLabels = {
  landmark:'🏛 Landmark', revolt:'⚔ Revolt / Uprising', battle:'🛡 Battle',
  political:'📜 Political', tragedy:'🕊 Tragedy', culture:'🎭 Culture'
};

function openPanel(locId) {
  const loc = LOCATIONS.find(l => l.id === locId);
  if (!loc) return;

  // Header
  document.getElementById('panel-badge').className = `panel-cat-badge ${catColors[loc.cat]}`;
  document.getElementById('panel-badge').textContent = catLabels[loc.cat] || loc.cat;
  document.getElementById('panel-title').textContent = loc.name;
  document.getElementById('panel-subtitle').textContent = loc.subtitle;

  // Overview
  document.getElementById('tab-overview').innerHTML = `
    <div class="section-label">About</div>
    <p class="prose">${loc.overview}</p>
    ${loc.overview2 ? `<p class="prose">${loc.overview2}</p>` : ''}
    ${loc.highlight ? `<div class="highlight-box"><p>${loc.highlight}</p></div>` : ''}
    ${loc.metaGrid ? `
      <div class="section-label">Key Facts</div>
      <div class="meta-grid">${loc.metaGrid.map(m => `
        <div class="meta-cell"><div class="key">${m.key}</div><div class="val">${m.val}</div></div>
      `).join('')}</div>` : ''}
  `;

  // History / Timeline
  document.getElementById('tab-history').innerHTML = `
    <div class="section-label">Chronological History</div>
    <div class="timeline">
      ${(loc.history || []).map((h,i) => `
        <div class="tl-item" style="animation-delay:${i*0.05}s">
          <div class="tl-dot ${h.cat || loc.cat}"></div>
          <div class="tl-year">${h.year}</div>
          <div class="tl-event">${h.event}</div>
          <div class="tl-desc">${h.desc}</div>
        </div>
      `).join('')}
    </div>
  `;

  // Events
  const allEvents = (loc.history || []).concat((loc.globalEvents || []).map(ge => {
    const found = GLOBAL_EVENTS.find(e => e.id === ge);
    return found ? {year: found.year, event: found.label, desc:'See global historical timeline.', cat: found.cat} : null;
  }).filter(Boolean));
  document.getElementById('tab-events').innerHTML = allEvents.length ? `
    <div class="section-label">Connected Historical Events</div>
    <div class="timeline">
      ${allEvents.sort((a,b) => parseInt(a.year) - parseInt(b.year)).map((h,i) => `
        <div class="tl-item" style="animation-delay:${i*0.05}s">
          <div class="tl-dot ${h.cat || ''}"></div>
          <div class="tl-year">${h.year}</div>
          <div class="tl-event">${h.event}</div>
          <div class="tl-desc">${h.desc}</div>
        </div>
      `).join('')}
    </div>
  ` : '<p class="prose" style="color:var(--muted)">No connected events recorded.</p>';

  // Figures
  document.getElementById('tab-figures').innerHTML = (loc.figures && loc.figures.length) ? `
    <div class="section-label">Notable Figures</div>
    ${loc.figures.map(f => `
      <div class="figure-card">
        <div class="fig-avatar">${f.emoji}</div>
        <div class="fig-info">
          <div class="fig-role">${f.role}</div>
          <h4>${f.name}</h4>
          <p>${f.desc}</p>
        </div>
      </div>
    `).join('')}
  ` : '<p class="prose" style="color:var(--muted)">No notable figures recorded for this location.</p>';

  // Sources
  document.getElementById('tab-sources').innerHTML = (loc.sources && loc.sources.length) ? `
    <div class="section-label">Sources &amp; References</div>
    ${loc.sources.map(s => `
      <div class="source-item"><strong>${s.title}</strong><br>${s.detail}</div>
    `).join('')}
    <div style="margin-top:16px;padding:12px;border-radius:var(--r);background:var(--cream);font-size:12px;color:var(--muted)">
      <strong>Note:</strong> This atlas presents historical information for educational purposes from a Kurdish historical perspective. 
      Events are documented from multiple scholarly sources. Readers are encouraged to consult the referenced works directly for complete accounts.
    </div>
  ` : '<p class="prose" style="color:var(--muted)">No sources listed.</p>';

  // Switch to overview tab
  switchTab('overview');

  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('panel-body').scrollTop = 0;
}

function closePanel() {
  document.getElementById('detail-panel').classList.remove('open');
}

function switchTab(tabId) {
  document.querySelectorAll('.ptab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabId));
  document.querySelectorAll('.tab-content').forEach(tc => tc.classList.toggle('active', tc.id === `tab-${tabId}`));
}

document.getElementById('panel-close').addEventListener('click', closePanel);
document.querySelectorAll('.ptab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

/* ═══════════════════════════════════════════════════════════
   SEARCH
═══════════════════════════════════════════════════════════ */
const searchInput = document.getElementById('search');
const searchResults = document.getElementById('search-results');

function buildSearchIndex() {
  const idx = [];
  LOCATIONS.forEach(loc => {
    idx.push({id:loc.id, name:loc.name, sub:loc.subtitle, cat:loc.cat, lat:loc.lat, lng:loc.lng});
    (loc.history || []).forEach(h => idx.push({id:loc.id, name:h.event, sub:`${h.year} — ${loc.name}`, cat:h.cat||loc.cat, lat:loc.lat, lng:loc.lng}));
    (loc.figures || []).forEach(f => idx.push({id:loc.id, name:f.name, sub:f.role+' — '+loc.name, cat:loc.cat, lat:loc.lat, lng:loc.lng}));
  });
  return idx;
}
const searchIndex = buildSearchIndex();

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q || q.length < 2) { searchResults.style.display = 'none'; return; }
  const hits = searchIndex.filter(i => i.name.toLowerCase().includes(q) || i.sub.toLowerCase().includes(q)).slice(0,8);
  if (!hits.length) { searchResults.style.display = 'none'; return; }
  searchResults.innerHTML = hits.map(h => `
    <div class="sr-item" onclick="handleSearchHit('${h.id}','${h.lat}','${h.lng}')">
      <strong>${highlight(h.name, q)}</strong>
      <span class="sr-cat">${h.cat} · ${h.sub}</span>
    </div>
  `).join('');
  searchResults.style.display = 'block';
});

function highlight(text, q) {
  const re = new RegExp(`(${q})`, 'gi');
  return text.replace(re, '<mark style="background:rgba(201,169,110,.3);color:inherit;border-radius:2px">$1</mark>');
}

function handleSearchHit(locId, lat, lng) {
  map.setView([parseFloat(lat), parseFloat(lng)], 10, {animate:true});
  openPanel(locId);
  searchResults.style.display = 'none';
  searchInput.value = '';
}

document.addEventListener('click', e => {
  if (!e.target.closest('#search-wrap')) searchResults.style.display = 'none';
});

/* ═══════════════════════════════════════════════════════════
   GLOBAL TIMELINE DRAWER
═══════════════════════════════════════════════════════════ */
function buildTimeline() {
  const track = document.getElementById('tl-track');
  // Group by year
  const byYear = {};
  GLOBAL_EVENTS.forEach(e => {
    if (!byYear[e.year]) byYear[e.year] = [];
    byYear[e.year].push(e);
  });
  const years = Object.keys(byYear).sort((a,b) => a-b);
  const minY = parseInt(years[0]), maxY = parseInt(years[years.length-1]);
  document.getElementById('tl-range').textContent = `${minY} – ${maxY}`;

  // Build ticks
  let html = '';
  years.forEach(yr => {
    const evts = byYear[yr];
    html += `<div class="tl-tick">`;
    evts.forEach(e => {
      const locIds = LOCATIONS.filter(l => (l.globalEvents||[]).includes(e.id) || (l.history||[]).some(h => h.year == e.year && h.event.toLowerCase().includes(e.label.toLowerCase().slice(0,8)))).map(l => l.id);
      const clickId = locIds[0] || null;
      html += `<div class="tl-evt-dot ${e.cat}" title="${e.label}" onclick="${clickId ? `openPanel('${clickId}')` : ''}" style="cursor:${clickId?'pointer':'default'}"></div>`;
      html += `<div class="tl-evt-label">${e.label}</div>`;
    });
    html += `<div class="tl-tick-line"></div><div class="tl-tick-year">${yr}</div>`;
    html += `</div>`;
  });
  track.innerHTML = html;
}
buildTimeline();

document.getElementById('btn-timeline').addEventListener('click', () => {
  const drawer = document.getElementById('timeline-drawer');
  drawer.classList.toggle('open');
  document.getElementById('btn-timeline').classList.toggle('active');
});
document.getElementById('tl-close-btn').addEventListener('click', () => {
  document.getElementById('timeline-drawer').classList.remove('open');
  document.getElementById('btn-timeline').classList.remove('active');
});

/* ═══════════════════════════════════════════════════════════
   DARK MODE
═══════════════════════════════════════════════════════════ */
let isDark = false;
document.getElementById('btn-dark').addEventListener('click', () => {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.getElementById('btn-dark').textContent = isDark ? '☀️' : '🌙';
  if (isDark) {
    map.removeLayer(lightTiles);
    darkTiles.addTo(map);
  } else {
    map.removeLayer(darkTiles);
    lightTiles.addTo(map);
  }
  // system preference
  if (window.matchMedia('(prefers-color-scheme: dark)').matches && !isDark) {
    // skip
  }
});

// Honour system dark mode on load
if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
  setTimeout(() => document.getElementById('btn-dark').click(), 1400);
}

/* ═══════════════════════════════════════════════════════════
   LOCATE / FIT
═══════════════════════════════════════════════════════════ */
document.getElementById('btn-locate').addEventListener('click', () => {
  map.fitBounds(KURDISTAN_BOUNDS, {padding:[40,40], animate:true});
});

/* ═══════════════════════════════════════════════════════════
   LOADING SCREEN
═══════════════════════════════════════════════════════════ */
setTimeout(() => {
  document.getElementById('loading').classList.add('hide');
}, 1500);

window.openPanel = openPanel;
window.closePanel = closePanel;
window.switchTab = switchTab;
window.handleSearchHit = handleSearchHit;
})(); // end IIFE
}); // end window load
</script>
</body>
